<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Co-pilot</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --border2: #3a3a3a;
      --text: #e8e8e8;
      --text2: #999;
      --text3: #666;
      --accent: #7c6af7;
      --accent-hover: #9183f9;
      --accent-dim: rgba(124,106,247,0.12);
      --pass: #22c55e;
      --pass-bg: rgba(34,197,94,0.1);
      --fail: #ef4444;
      --fail-bg: rgba(239,68,68,0.1);
      --radius: 8px;
      --radius-sm: 5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(15,15,15,0.9);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-email {
      color: var(--text3);
      font-size: 12px;
      padding: 4px 10px;
    }
    .nav-link {
      color: var(--text2);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }

    /* ── Layout ── */
    .page { max-width: 900px; margin: 0 auto; padding: 36px 24px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    /* ── Typography ── */
    h1 { font-size: 20px; font-weight: 600; color: var(--text); }
    h2 { font-size: 15px; font-weight: 600; color: var(--text); }
    .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .muted { color: var(--text3); font-size: 12px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover { border-color: var(--text3); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: var(--fail);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }

    .btn-run {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(124,106,247,0.3);
    }
    .btn-run:hover { background: rgba(124,106,247,0.2); }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    input[type=text], input[type=email], input[type=password], textarea, select {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    input::placeholder, textarea::placeholder { color: var(--text3); }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border2); }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    td { padding: 12px 12px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-pass { background: var(--pass-bg); color: var(--pass); }
    .badge-fail { background: var(--fail-bg); color: var(--fail); }
    .badge-neutral { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }

    /* ── Alert / Error ── */
    .alert-error {
      background: var(--fail-bg);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--fail);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-top: 12px;
    }

    /* ── Code / Pre ── */
    pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text2);
      line-height: 1.7;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
    }
    .empty p { margin-top: 8px; font-size: 13px; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Stat row ── */
    .stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }
    .stat { }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    /* ── Back link ── */
    .back { font-size: 12px; color: var(--text3); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
    .back:hover { color: var(--text2); }

    /* ── Reasoning box ── */
    .reasoning { font-size: 12px; color: var(--text3); margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">
      <span class="dot"></span>
      Eval Co-pilot
    </a>
    <div class="nav-right">
      {% if user is defined %}
        <span class="nav-email">{{ user.email }}</span>
        <a href="/features" class="nav-link">Features</a>
        <a href="/logout" class="nav-link">Logout</a>
      {% else %}
        <a href="/login" class="nav-link">Login</a>
        <a href="/register" class="btn btn-primary btn-sm">Get started</a>
      {% endif %}
    </div>
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>

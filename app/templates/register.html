{% extends "base.html" %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <div style="text-align:center;margin-bottom:32px;">
    <h1>Create an account</h1>
    <p class="subtitle">Start evaluating your AI features</p>
  </div>
  <div class="card">
    <form method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autofocus placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:4px;">Create account</button>
    </form>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <hr class="divider">
    <p class="muted" style="text-align:center;">Already have an account? <a href="/login" style="color:var(--accent);text-decoration:none;">Login</a></p>
  </div>
</div>
{% endblock %}

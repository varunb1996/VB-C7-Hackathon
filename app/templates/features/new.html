{% extends "base.html" %}
{% block content %}
<a href="/features" class="back">← Back to features</a>

<div style="max-width:560px;">
  <div style="margin-bottom:24px;">
    <h1>New Feature</h1>
    <p class="subtitle">Describe the AI feature you want to evaluate.</p>
  </div>

  <div class="card">
    <form method="post">
      <div class="form-group">
        <label>Feature name</label>
        <input type="text" name="name" required autofocus placeholder="e.g. Support ticket summariser">
      </div>
      <div class="form-group">
        <label>What does it do?</label>
        <textarea name="description" placeholder="e.g. Takes a raw support ticket and returns a 2-sentence summary of the issue and the requested resolution."></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" type="submit">Create feature →</button>
        <a href="/features" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
  </div>
</div>
{% endblock %}
